<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SR Zone — Live Class</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
<!--
  V1/V0.5 RELIABILITY PATTERN:
  YouTube API loads unconditionally in <head>.
  By the time any user passes the gate AND waits for a timer,
  YT is already fully ready in memory. Zero race condition possible.
  DO NOT lazy-load this script. The reliability is worth the ~11KB cost.
-->
<script src="https://www.youtube.com/iframe_api"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:     #202124;
  --bg2:    #2b2d30;
  --bg3:    #3c4043;
  --border: #3c4043;
  --text:   #e8eaed;
  --text2:  #9aa0a6;
  --accent: #8ab4f8;
  --red:    #ea4335;
  --amber:  #fbbc04;
  --radius: 8px;
}

body {
  font-family: 'Google Sans', 'Segoe UI', sans-serif;
  background: var(--bg); color: var(--text);
  height: 100dvh; overflow: hidden;
  display: flex; flex-direction: column;
}

/* ══ GATE ══ */
#gate {
  position: fixed; inset: 0; background: var(--bg);
  display: flex; align-items: center; justify-content: center; z-index: 9999;
}
.gate-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 12px; padding: 2.5rem 2rem;
  width: 340px; max-width: 92vw;
  display: flex; flex-direction: column; gap: 1.2rem; text-align: center;
}
.gate-logo { font-size: 28px; font-weight: 600; letter-spacing: -0.5px; }
.gate-logo span { color: var(--accent); }
.gate-sub { font-size: 13px; color: var(--text2); }
.gate-input {
  width: 100%; background: var(--bg3); border: 1px solid var(--border);
  border-radius: var(--radius); color: var(--text); font-family: inherit;
  font-size: 15px; padding: 12px 14px; outline: none;
  text-align: center; letter-spacing: 2px; transition: border-color 0.2s;
}
.gate-input:focus { border-color: var(--accent); }
.gate-input::placeholder { letter-spacing: 0; color: var(--text2); font-size: 13px; }
.gate-btn {
  width: 100%; background: #1a73e8; color: #fff; border: none;
  border-radius: var(--radius); padding: 13px; font-family: inherit;
  font-size: 15px; font-weight: 500; cursor: pointer; transition: background 0.2s;
}
.gate-btn:hover { background: #1765cc; }
.gate-error { font-size: 13px; color: var(--red); display: none; }
.gate-note { font-size: 11px; color: var(--text2); }

/* ══ STATUS SCREEN ══ */
#status-screen {
  position: fixed; inset: 0; background: var(--bg);
  display: none; flex-direction: column;
  align-items: center; justify-content: center; gap: 20px; z-index: 500;
}
.status-emoji { font-size: 52px; }
.status-title { font-size: 24px; font-weight: 500; }
.status-sub { font-size: 15px; color: var(--text2); text-align: center; max-width: 320px; line-height: 1.6; }
.countdown-pill {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 99px;
  padding: 10px 24px; display: flex; align-items: center; gap: 10px;
  font-size: 13px; color: var(--text2);
}
#countdown-val {
  font-size: 20px; font-weight: 600; color: var(--accent);
  font-variant-numeric: tabular-nums; letter-spacing: 1px;
}
/*
  Sync/Rejoin button — shown ~15s before countdown hits zero.
  On slow 2G, the page reload may still be in progress.
  Giving students a tap target feels like Google Meet's "Rejoin" button.
*/
#sync-btn {
  display: none;
  background: #1a73e8; color: #fff; border: none;
  border-radius: var(--radius); padding: 12px 32px;
  font-family: inherit; font-size: 15px; font-weight: 500;
  cursor: pointer; transition: background 0.2s; margin-top: 4px;
}
#sync-btn:hover { background: #1765cc; }

/* Student count shown on waiting screen */
#student-count-status { font-size: 13px; color: var(--text2); display: none; }

/* ══ TOP BAR ══ */
#topbar {
  height: 52px; flex-shrink: 0; background: var(--bg);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 16px; gap: 12px; z-index: 10;
}
.tb-title { font-size: 15px; font-weight: 500; }
.tb-sep { flex: 1; }
.tb-chip {
  display: flex; align-items: center; gap: 6px;
  font-size: 12px; padding: 4px 10px; border-radius: 99px; font-weight: 500;
}
.chip-live { background: rgba(234,67,53,0.15); border: 1px solid rgba(234,67,53,0.35); color: #f28b82; }
.live-dot { width: 7px; height: 7px; background: var(--red); border-radius: 50%; animation: blink 1.4s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }
.chip-time { background: var(--bg2); border: 1px solid var(--border); color: var(--text2); font-variant-numeric: tabular-nums; }
.chip-count { background: var(--bg2); border: 1px solid var(--border); color: var(--text2); }

/* ══ MAIN ══ */
#main { flex: 1; display: flex; height: calc(100dvh - 52px); overflow: hidden; }
#video-col { flex: 1; display: flex; flex-direction: column; position: relative; background: #000; }
#video-wrap { flex: 1; height: 100%; position: relative; }
#yt-player { position: absolute; width: 100%; height: 100%; pointer-events: none; }
#tap-zone { position: absolute; inset: 0; z-index: 5; display: none; }
#click-shield { position: absolute; inset: 0; z-index: 4; cursor: default; }

/* Teacher PiP tile */
#teacher-tile {
  position: absolute; top: 12px; right: 12px; width: 130px; height: 78px;
  background: #1a1a2e; border: 2px solid var(--border); border-radius: var(--radius);
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px; z-index: 6;
}
.tile-avatar {
  width: 32px; height: 32px; border-radius: 50%; background: #1a73e8;
  display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600;
}
.tile-name { font-size: 10px; color: var(--text2); background: rgba(0,0,0,0.6); padding: 2px 8px; border-radius: 99px; }

#hand-notif {
  position: absolute; bottom: 96px; left: 16px;
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 10px 14px;
  font-size: 13px; color: var(--text2); z-index: 6; display: none;
}

/* Autoplay blocked prompt */
#play-prompt {
  position: absolute; inset: 0; background: rgba(0,0,0,0.6);
  display: none; align-items: center; justify-content: center;
  flex-direction: column; z-index: 10; cursor: pointer;
}
#play-prompt-inner {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 12px;
  padding: 28px 36px; text-align: center;
  display: flex; flex-direction: column; gap: 12px; align-items: center;
}
.play-icon {
  width: 64px; height: 64px; background: #1a73e8;
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
}
.play-icon .material-symbols-outlined { font-size: 32px; }

/* ══ BOTTOM BAR ══ */
#bottom-bar {
  height: 80px; 
  flex-shrink: 0; 
  background: var(--bg);
  border-top: 1px solid var(--border);
  display: none;
  align-items: center; 
  justify-content: center;
  gap: 12px; 
  padding: 0 24px; 
  z-index: 20; 
}
  
.ctrl-circle {
  width: 48px; height: 48px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; border: none; background: #3c4043; color: white;
}
.cc-off { background: #ea4335 !important; }
.cc-hand-on { background: var(--amber) !important; color: #000 !important; }
.cc-chat-on { background: var(--accent) !important; color: #000 !important; }
.cc-leave { background: #ea4335; width: 64px; border-radius: 32px; }
.material-symbols-outlined { font-size: 22px; font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }

/* ══ CHAT PANEL ══ */
#chat-panel {
  width: 320px; flex-shrink: 0; background: var(--bg2);
  border-left: 1px solid var(--border);
  display: none; flex-direction: column; overflow: hidden;
}
#chat-panel.open { display: flex; }
.chat-head {
  padding: 12px 14px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.chat-head-title { font-size: 13px; font-weight: 500; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; }
.chat-close { background: none; border: none; color: var(--text2); font-size: 18px; cursor: pointer; padding: 2px 6px; }
.chat-loader { flex: 1; display: flex; align-items: center; justify-content: center; color: var(--text2); font-size: 13px; }
#yt-chat-frame { flex: 1; border: none; background: transparent; min-height: 0; display: none; }

/* ══ TOAST ══ */
#toast {
  position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 9px 16px;
  font-size: 13px; color: var(--text2);
  opacity: 0; transition: opacity 0.25s;
  z-index: 9999; pointer-events: none; white-space: nowrap;
}
#toast.show { opacity: 1; }

/* ══ RESPONSIVE ══ */
@media (max-width: 640px) {
  #chat-panel {
    position: fixed; bottom: 0; left: 0; width: 100%; height: 90%; z-index: 100;
    border: none; border-radius: 16px 16px 0 0; box-shadow: 0 -10px 25px rgba(0,0,0,0.8);
  }
  #teacher-tile { width: 90px; height: 56px; top: 8px; right: 8px; }
  .ctrl-circle { width: 42px; height: 42px; }
  #bottom-bar { gap: 8px; padding: 0 12px; z-index: 110; }
}

@media (orientation: landscape) and (max-height: 500px) {
  #topbar, #teacher-tile { display: none !important; }
  #main { height: 100dvh; }

  /* In landscape, we give chat 100% height to ensure the "Send" button shows */
  #chat-panel { 
    top: 0 !important; 
    height: 100dvh !important; 
    border-radius: 0; 
  }
  
  #bottom-bar {
    position: relative; bottom: 0; left: 0; right: 0;
    height: 60px; border-top: none;
    background: rgba(32,33,36,0.88); gap: 20px;
  }
  .ctrl-circle { width: 40px; height: 40px; background: rgba(255,255,255,0.12); }
  #hand-notif { bottom: 68px; }
}
</style>
</head>
<body>

<!-- ══ GATE ══ -->
<div id="gate">
  <div class="gate-card">
    <div class="gate-logo">SR <span>Zone</span></div>
    <div class="gate-sub">Enter your class access code</div>
    <input id="code-input" class="gate-input" type="text"
      maxlength="16" placeholder="Class code" autocomplete="off" spellcheck="false" />
    <div id="gate-error" class="gate-error">Incorrect code. Please try again.</div>
    <button class="gate-btn" onclick="checkCode()">Join Class</button>
    <div class="gate-note">Access is saved on this device for 6 hours</div>
  </div>
</div>

<!-- ══ STATUS SCREEN ══ -->
<div id="status-screen">
  <div class="status-emoji" id="s-emoji">🕐</div>
  <div class="status-title" id="s-title">Loading...</div>
  <div class="status-sub" id="s-sub"></div>
  <div class="countdown-pill" id="s-countdown" style="display:none">
    Class starts in &nbsp;<span id="countdown-val">00:00:00</span>
  </div>
  <button id="sync-btn" onclick="manualSync()">🔄 Join Class Now</button>
  <div id="student-count-status"></div>
</div>

<!-- ══ TOP BAR ══ -->
<div id="topbar" style="display:none">
  <div class="tb-title" id="tb-title">SR Zone</div>
  <div class="tb-sep"></div>
  <div class="tb-chip chip-count" id="student-chip">👥 --</div>
  <div class="tb-chip chip-live"><div class="live-dot"></div>LIVE</div>
  <div class="tb-chip chip-time" id="tb-clock">--:--</div>
</div>

<!-- ══ MAIN ══ -->
<div id="main" style="display:none">
  <div id="video-col">
    <div id="video-wrap">
      <div id="yt-player"></div>
      <div id="tap-zone"></div>
      <div id="click-shield"></div>

      <div id="play-prompt" onclick="userInitiatedPlay()">
        <div id="play-prompt-inner">
          <div class="play-icon">
            <span class="material-symbols-outlined">play_arrow</span>
          </div>
          <p style="font-size:15px; color:var(--text2)">Tap to join the live class</p>
        </div>
      </div>

      <div id="teacher-tile">
        <div class="tile-avatar">SR</div>
        <div class="tile-name">Teacher</div>
      </div>

      <div id="hand-notif"></div>
    </div>

    <div id="bottom-bar">
      <button class="ctrl-circle cc-off" id="mic-btn" onclick="toggleMic()">
        <span class="material-symbols-outlined">mic_off</span>
      </button>
      <button class="ctrl-circle cc-off" id="cam-btn" onclick="toggleCam()">
        <span class="material-symbols-outlined">videocam_off</span>
      </button>
      <button class="ctrl-circle" id="hand-btn" onclick="toggleHand()">
        <span class="material-symbols-outlined">pan_tool</span>
      </button>
      <button class="ctrl-circle" id="chat-btn" onclick="toggleChat()">
        <span class="material-symbols-outlined">chat</span>
      </button>
      <button class="ctrl-circle cc-leave" onclick="leaveClass()">
        <span class="material-symbols-outlined">call_end</span>
      </button>
    </div>
  </div>

  <div id="chat-panel">
    <div class="chat-head">
      <span class="chat-head-title">Class Chat</span>
      <button class="chat-close" onclick="toggleChat()">✕</button>
    </div>
    <div id="chat-loader" class="chat-loader">Connecting to chat...</div>
    <iframe id="yt-chat-frame" src="" allow="autoplay"
      sandbox="allow-same-origin allow-scripts allow-forms allow-popups"></iframe>
  </div>
</div>

<div id="toast"></div>

<script>
// ══════════════════════════════════════════════════════
// zzzCONFIG — edit these values
// ══════════════════════════════════════════════════════
const CONFIG = {
  classes: {
    "d542ccf765015a2ea3495c2fea97f5620ce3c090d5305638c4ee9ed4861ba7b9": {
      videoId: "5D7SnhC-9IA",
      title:   "Today's Class"
    },
    "PHYSICS01": {
      videoId: "YOUR_VIDEO_ID_2",
      title:   "Physics — Ch 1"
    },
  },

  classHour:         08,
  classMinute:       58,
  // ── IMPORTANT ──────────────────────────────────────────────
  // Set this to EXACTLY your video's actual length in minutes.
  // When video ENDED fires = class is genuinely over.
  // No looping, no reinit, no complex state. Clean and simple.
  classDurationMins: 90,
  // ───────────────────────────────────────────────────────────

  ytChatStreamId:  "iTDZ5cqHYF4",
  domain:          "live.thesrzone.com",
  sessionMs:       6 * 60 * 60 * 1000,
  studentCountBase: 95, // tweak to match your real expected class size
};
// ══════════════════════════════════════════════════════

// ── State (kept minimal — V0.5 lesson: fewer flags = fewer bugs) ──
let player       = null;
let currentClass = null;
let clockTick    = null;
let statusTick   = null;
/*
  videoStarted: set to TRUE exactly once per page load, never reset during session.
  If anything goes wrong, manualSync() calls location.reload() for guaranteed clean state.
  This is the V0.5 pattern. V2 reset this flag in multiple places which caused reinit chaos.
*/
let videoStarted = false;
let playerReady  = false;
let chatLoaded   = false;
let micOn = false, camOn = false, handUp = false, chatOpen = false;
let controlsVisible = false, controlsTimeout = null;
let studentCountInterval = null;

const isMobile = () => ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);

// ── Controls visibility ───────────────────────────────────────
function showControls() {
  if (!videoStarted) return;
  if (isMobile() && chatOpen) return;
  controlsVisible = true;
  document.getElementById('bottom-bar').style.display = 'flex';
  document.getElementById('tap-zone').style.display = 'none';
  clearTimeout(controlsTimeout);
  controlsTimeout = setTimeout(hideControls, 5000);
}

function hideControls() {
  if (chatOpen && !isMobile()) return;
  controlsVisible = false;
  document.getElementById('bottom-bar').style.display = 'none';
  
  // Bring back the tap-zone so mobile users can tap to show controls again
  if (isMobile()) {
    document.getElementById('tap-zone').style.display = 'block';
  }
}

document.addEventListener('mousemove', e => {
  if (e.target.closest('#video-col') || e.target.closest('#bottom-bar')) showControls();
});
document.addEventListener('DOMContentLoaded', () => {
  const bar = document.getElementById('bottom-bar');
  if (bar) bar.addEventListener('mouseenter', () => clearTimeout(controlsTimeout));
  const tz = document.getElementById('tap-zone');
  if (tz) tz.addEventListener('touchend', e => { e.preventDefault(); showControls(); });
});

// ── Gate ─────────────────────────────────────────────────────
document.getElementById('code-input')
  .addEventListener('keydown', e => { if (e.key === 'Enter') checkCode(); });

window.addEventListener('load', () => {
  try {
    const s = JSON.parse(localStorage.getItem('srzone_v2'));
    if (s && Date.now() < s.exp && CONFIG.classes[s.code]) {
      currentClass = CONFIG.classes[s.code];
      launchApp();
    }
  } catch {}
});

async function checkCode() {
  const input = document.getElementById('code-input').value.trim();
  if (!input) return;
  const buf  = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(input));
  const hash = Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
  const cls  = CONFIG.classes[hash];
  if (!cls) {
    document.getElementById('gate-error').style.display = 'block';
    const inp = document.getElementById('code-input');
    inp.style.borderColor = '#ea4335';
    setTimeout(() => { inp.style.borderColor = ''; }, 1500);
    return;
  }
  localStorage.setItem('srzone_v2', JSON.stringify({ code: hash, exp: Date.now() + CONFIG.sessionMs }));
  currentClass = cls;
  launchApp();
}

// ── App launch ────────────────────────────────────────────────
function launchApp() {
  document.getElementById('gate').style.display   = 'none';
  document.getElementById('topbar').style.display = 'flex';
  document.getElementById('main').style.display   = 'flex';
  document.getElementById('tb-title').textContent = currentClass.title;
  startClock();
  checkState();
  statusTick = setInterval(checkState, 1000);
}

// ── Clock ─────────────────────────────────────────────────────
function startClock() {
  const tick = () => {
    document.getElementById('tb-clock').textContent =
      new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit', second:'2-digit' });
  };
  tick();
  clockTick = setInterval(tick, 1000);
}

// ── State machine ─────────────────────────────────────────────
function classStartToday() {
  const d = new Date();
  d.setHours(CONFIG.classHour, CONFIG.classMinute, 0, 0);
  return d;
}

function checkState() {
  const now   = new Date();
  const start = classStartToday();
  const end   = new Date(start.getTime() + CONFIG.classDurationMins * 60000);

  if (now < start) {
    const msLeft = start - now;
    showStatusScreen('🕐', "Class hasn't started yet",
      `Today's session begins at ${fmtTime(start)}.`, true, msLeft);

    // Waiting-room social proof
    const countEl = document.getElementById('student-count-status');
    countEl.style.display = 'block';
    countEl.textContent = `👥 ${simulatedCount()} students are waiting`;

    // ── RELOAD ON TIMER ZERO ──────────────────────────────────
    // Fresh page = YT API already loaded in <head> = instant play.
    // This is the cleanest solution to the race condition.
    // Only schedule once — the 1000ms tick window means this fires exactly once.
    if (msLeft > 0 && msLeft < 1000) {
      setTimeout(() => location.reload(), msLeft);
    }

  } else if (now >= start && now < end) {
  if (!videoStarted) {
        // Show a "Class is Live" state with a big button
        showStatusScreen('🚀', "Class is Live!", "The session has started.", false, 0);
        document.getElementById('sync-btn').style.display = 'block'; 
        document.getElementById('sync-btn').textContent = "ENTER CLASSROOM";
    }
    startStudentCountUpdater();

  } else {
    showStatusScreen('✅', "Class has ended",
      "Great session! See you tomorrow. 📚", false, 0);
    document.getElementById('sync-btn').style.display = 'none';
    document.getElementById('student-count-status').style.display = 'none';
    stopStudentCountUpdater();
  }
}

function showStatusScreen(emoji, title, sub, countdown, msLeft) {
  document.getElementById('status-screen').style.display = 'flex';
  document.getElementById('s-emoji').textContent = emoji;
  document.getElementById('s-title').textContent = title;
  document.getElementById('s-sub').textContent   = sub;
  const box = document.getElementById('s-countdown');
  if (countdown && msLeft > 0) {
    box.style.display = 'flex';
    document.getElementById('countdown-val').textContent = msToClock(msLeft);
  } else {
    box.style.display = 'none';
  }
}

function hideStatusScreen() {
  document.getElementById('status-screen').style.display = 'none';
}

// Manual fallback — if reload didn't fire on time (very slow device/network)
function manualSync() {
    const start = classStartToday();
    const now = new Date();
    const elapsed = Math.floor((now - start) / 1000);
    
    hideStatusScreen();
    showClassroom(elapsed);
}

// ── Classroom ─────────────────────────────────────────────────
function showClassroom(seekSecs) {
  if (videoStarted) return; // single guard, never reset during session (V0.5 pattern)
  videoStarted = true;
  showControls();

  player = new YT.Player('yt-player', {
    videoId: currentClass.videoId,
    playerVars: {
      autoplay: 1, controls: 0, disablekb: 1,
      modestbranding: 1, rel: 0, fs: 0,
      playsinline: 1, start: seekSecs, mute: 1,
    },
    events: {
      onReady:       onReady,
      onStateChange: onStateChange,
      onError:       onPlayerError,
    }
  });
}

function onReady(e) {
  playerReady = true;
  e.target.playVideo();
  setTimeout(() => {
    try {
      e.target.unMute();
      e.target.setVolume(100);
    } catch (err) {
      // Browser blocked unmute (common on iOS without user gesture)
      document.getElementById('play-prompt').style.display = 'flex';
    }
  }, 800);
}

function onStateChange(e) {
  if (e.data === YT.PlayerState.PLAYING) {
    document.getElementById('play-prompt').style.display = 'none';
  }
  if (e.data === YT.PlayerState.PAUSED) {
    setTimeout(() => { if (player && videoStarted) player.playVideo(); }, 150);
  }
  if (e.data === YT.PlayerState.ENDED) {
    // With strict duration matching, ENDED = class is genuinely over.
    // No looping needed, no reinit. Just show the ended screen.
    clearInterval(clockTick);
    clearInterval(statusTick);
    stopStudentCountUpdater();
    document.getElementById('main').style.display       = 'none';
    document.getElementById('bottom-bar').style.display = 'none';
    document.getElementById('sync-btn').style.display = 'none';
    showStatusScreen('✅', "Class has ended!", "Great work today. See you next class! 📚", false, 0);
  }
}

function onPlayerError(e) {
  // Don't reset videoStarted — avoids checkState() hammering new YT.Player() every second.
  // Student can tap "Join Class Now" (manualSync) if they see a problem.
  console.warn('YT player error:', e.data);
}

function userInitiatedPlay() {
  document.getElementById('play-prompt').style.display = 'none';
  if (player && playerReady) {
    player.unMute();
    player.setVolume(100);
    player.playVideo();
  }
  showControls();
}

// ── Controls ──────────────────────────────────────────────────
function toggleMic() {
  micOn = !micOn;
  const btn = document.getElementById('mic-btn');
  btn.classList.toggle('cc-off', !micOn);
  btn.querySelector('span').textContent = micOn ? 'mic' : 'mic_off';
  showToast(micOn ? 'Microphone is on' : 'Microphone is muted');
}

function toggleCam() {
  camOn = !camOn;
  const btn = document.getElementById('cam-btn');
  btn.classList.toggle('cc-off', !camOn);
  btn.querySelector('span').textContent = camOn ? 'videocam' : 'videocam_off';
  showToast(camOn ? 'Video is on' : 'Video is off');
}

let handQueue = [];
function toggleHand() {
  handUp = !handUp;
  document.getElementById('hand-btn').className = handUp ? 'ctrl-circle cc-hand-on' : 'ctrl-circle';
  if (handUp) {
    showToast('✋ Hand raised!');
    showHandNotif('You');
  } else {
    document.getElementById('hand-notif').style.display = 'none';
    handQueue = [];
  }
}

function showHandNotif(name) {
  handQueue.push(name);
  const notif = document.getElementById('hand-notif');
  notif.innerHTML = `✋ ${handQueue.join(', ')} raised hand${handQueue.length > 1 ? 's' : ''}`;
  notif.style.display = 'block';
}

function toggleChat() {
  chatOpen = !chatOpen;
  const panel = document.getElementById('chat-panel');
  const btn   = document.getElementById('chat-btn');

  if (chatOpen) {
    panel.classList.add('open');
    btn.className = 'ctrl-circle cc-chat-on';

    // Lazy load iframe on first open — saves bandwidth for non-chat users
    if (!chatLoaded) {
      const src   = `https://www.youtube.com/live_chat?v=${CONFIG.ytChatStreamId}&embed_domain=${CONFIG.domain}&dark_theme=1`;
      const frame = document.getElementById('yt-chat-frame');
      frame.src   = src;
      frame.onload = () => {
        document.getElementById('chat-loader').style.display = 'none';
        frame.style.display = 'block';
      };
      chatLoaded = true;
    }

    if (isMobile()) {
      document.getElementById('bottom-bar').style.display = 'none';
    } else {
      clearTimeout(controlsTimeout);
    }
  } else {
    panel.classList.remove('open');
    btn.className = 'ctrl-circle';
    panel.style.height = '';
    if (isMobile()) {
      showControls();
    } else {
      controlsTimeout = setTimeout(hideControls, 4000);
    }
  }
}

function leaveClass() {
  if (!confirm('Leave the class session?')) return;
  if (player) player.pauseVideo();
  localStorage.removeItem('srzone_v2');
  location.reload();
}

// ── Simulated student count ───────────────────────────────────
function simulatedCount() {
  return CONFIG.studentCountBase + Math.round(Math.sin(Date.now() / 90000) * 4);
}
function updateStudentChip() {
  document.getElementById('student-chip').textContent = `👥 ${simulatedCount()}`;
}
function startStudentCountUpdater() {
  if (studentCountInterval) return;
  updateStudentChip();
  studentCountInterval = setInterval(updateStudentChip, 30000);
}
function stopStudentCountUpdater() {
  clearInterval(studentCountInterval);
  studentCountInterval = null;
}

// ── Android back button intercept ────────────────────────────
history.pushState(null, '', location.href);
window.addEventListener('popstate', () => {
  history.pushState(null, '', location.href);
  if (videoStarted) showToast('Use the Leave button to exit class');
});

// ── Toast ─────────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

// ── Right-click block ─────────────────────────────────────────
document.addEventListener('contextmenu', e => {
  if (e.target.closest('#video-wrap')) e.preventDefault();
});

// ── Utils ─────────────────────────────────────────────────────
function fmtTime(d) {
  return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}
function msToClock(ms) {
  const s = Math.floor(ms / 1000);
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = s % 60;
  return [h, m, sec].map(x => String(x).padStart(2, '0')).join(':');
}
</script>
